<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Agencia</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #f0f0f5;
    --muted: #888896;
    --accent: #6c63ff;
    --accent2: #00d4aa;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; line-height: 1.6; min-height: 100vh; }
  .app { display: flex; min-height: 100vh; }
  .sidebar { width: 220px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border); padding: 24px 16px; display: flex; flex-direction: column; gap: 8px; position: sticky; top: 0; height: 100vh; }
  .main { flex: 1; padding: 32px; overflow: auto; }
  .logo { font-size: 16px; font-weight: 600; color: var(--text); padding: 8px 12px 24px; letter-spacing: -0.02em; }
  .logo span { color: var(--accent); }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; color: var(--muted); cursor: pointer; font-size: 13px; font-weight: 400; transition: all .15s; border: none; background: none; width: 100%; text-align: left; }
  .nav-item.active { background: rgba(108,99,255,0.15); color: var(--accent); }
  .sidebar-bottom { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border); }
  .last-update { font-size: 11px; color: var(--muted); padding: 8px 12px; font-family: var(--mono); }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
  .page-title { font-size: 22px; font-weight: 500; letter-spacing: -0.03em; }
  .page-title span { color: var(--muted); font-weight: 300; }
  .topbar-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .refresh-btn { display: flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border2); background: var(--surface); color: var(--text); font-family: var(--font); font-size: 13px; cursor: pointer; transition: all .15s; }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent2); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .platform-filter { display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 3px; }
  .pf-btn { padding: 5px 12px; border-radius: 6px; border: none; background: none; color: var(--muted); font-family: var(--font); font-size: 12px; cursor: pointer; transition: all .15s; }
  .pf-btn.active { background: var(--surface2); color: var(--text); }
  .summary-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
  .metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 18px 20px; }
  .metric-card.accent-card { border-color: rgba(108,99,255,0.3); }
  .metric-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
  .metric-value { font-size: 22px; font-weight: 500; letter-spacing: -0.03em; }
  .metric-sub { font-size: 11px; color: var(--muted); margin-top: 4px; font-family: var(--mono); }
  .table-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 24px; }
  .table-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border); }
  .table-title { font-size: 13px; font-weight: 500; }
  .table-count { font-size: 11px; color: var(--muted); font-family: var(--mono); }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { font-size: 11px; font-weight: 500; color: var(--muted); text-align: left; padding: 10px 20px; border-bottom: 1px solid var(--border); text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
  td { padding: 12px 20px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }
  .client-name { font-weight: 500; }
  .badge { display: inline-flex; align-items: center; font-size: 10px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
  .badge-meta { background: rgba(59,130,246,0.15); color: #60a5fa; }
  .badge-google { background: rgba(251,191,36,0.15); color: #fbbf24; }
  .perf-bar { height: 3px; background: rgba(255,255,255,0.08); border-radius: 2px; margin-top: 6px; width: 80px; overflow: hidden; }
  .perf-fill { height: 100%; border-radius: 2px; background: var(--accent); }
  .td-mono { font-family: var(--mono); font-size: 12px; }
  .ctr-good { color: #00d4aa; }
  .ctr-mid { color: #fbbf24; }
  .ctr-low { color: var(--muted); }
  .charts-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 24px; }
  @media (max-width: 900px) { .charts-grid { grid-template-columns: 1fr; } }
  .chart-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
  .chart-card-title { font-size: 13px; font-weight: 500; margin-bottom: 16px; color: var(--muted); }
  .loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: var(--muted); font-size: 13px; gap: 10px; }
  .spinner { width: 16px; height: 16px; border: 2px solid var(--border2); border-top-color: var(--accent); border-radius: 50%; animation: spin .6s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { text-align: center; padding: 60px; color: var(--muted); font-size: 13px; }
  .empty-title { font-size: 15px; font-weight: 500; color: var(--text); margin-bottom: 8px; }
  ::-webkit-scrollbar { width: 4px; height: 4px; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="logo">Agencia<span>.</span></div>
    <button class="nav-item active">Dashboard</button>
    <button class="nav-item">Clientes</button>
    <button class="nav-item">Reportes</button>
    <button class="nav-item">Alertas</button>
    <div class="sidebar-bottom">
      <div class="last-update" id="lastUpdate">Cargando...</div>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div class="page-title">Dashboard <span>/ clientes</span></div>
      <div class="topbar-right">
        <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted)">
          <div class="status-dot"></div> En vivo
        </div>
        <div class="platform-filter">
          <button class="pf-btn active" onclick="filterPlatform('all',this)">Todos</button>
          <button class="pf-btn" onclick="filterPlatform('facebook',this)">Meta</button>
          <button class="pf-btn" onclick="filterPlatform('google_ads',this)">Google</button>
        </div>
        <button class="refresh-btn" onclick="loadData()">↻ Actualizar</button>
      </div>
    </div>
    <div class="summary-grid" id="summaryCards">
      <div class="metric-card"><div class="metric-label">Cargando</div><div class="metric-value">—</div></div>
      <div class="metric-card"><div class="metric-label">Cargando</div><div class="metric-value">—</div></div>
      <div class="metric-card"><div class="metric-label">Cargando</div><div class="metric-value">—</div></div>
      <div class="metric-card"><div class="metric-label">Cargando</div><div class="metric-value">—</div></div>
      <div class="metric-card"><div class="metric-label">Cargando</div><div class="metric-value">—</div></div>
    </div>
    <div class="charts-grid">
      <div class="chart-card">
        <div class="chart-card-title">Inversión por cliente (este mes)</div>
        <div style="position:relative;height:220px"><canvas id="barChart"></canvas></div>
      </div>
      <div class="chart-card">
        <div class="chart-card-title">Distribución por plataforma</div>
        <div style="position:relative;height:220px"><canvas id="donutChart"></canvas></div>
      </div>
    </div>
    <div class="table-section">
      <div class="table-header">
        <div class="table-title">Todos los clientes</div>
        <div class="table-count" id="tableCount">—</div>
      </div>
      <div class="table-wrap">
        <div id="tableBody"><div class="loading"><div class="spinner"></div> Cargando datos...</div></div>
      </div>
    </div>
  </main>
</div>
<script>
const SUPABASE_URL = 'https://obtzrkkvpddiogaucseq.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9idHpya2t2cGRkaW9xYXVjc2VxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1NDQ2NDYsImV4cCI6MjA5MDEyMDY0Nn0.HgebmojGWYO6LI7KkzrFXKdqe9YI679k5zFJdT97JQk';
const TABLE = 'clientes_metricas';
const REFRESH_INTERVAL = 15 * 60 * 1000;

let allData = [];
let currentFilter = 'all';
let barChartInst = null;
let donutChartInst = null;

function fmtARS(n) {
  if (!n && n !== 0) return '$0';
  if (n >= 1000000) return '$' + (n/1000000).toFixed(2) + 'M';
  return '$' + Math.round(n).toLocaleString('es-AR');
}
function fmtNum(n) {
  if (!n && n !== 0) return '0';
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(0) + 'K';
  return Math.round(n).toString();
}
function ctrClass(ctr) {
  if (ctr >= 3) return 'ctr-good';
  if (ctr >= 1.5) return 'ctr-mid';
  return 'ctr-low';
}

async function loadData() {
  try {
    const res = await fetch(
      `${SUPABASE_URL}/rest/v1/${TABLE}?select=*&order=spend.desc`,
      {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': 'Bearer ' + SUPABASE_KEY,
          'Content-Type': 'application/json'
        }
      }
    );
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    allData = data || [];
    renderAll();
    document.getElementById('lastUpdate').textContent = 'Actualizado: ' + new Date().toLocaleTimeString('es-AR', {hour:'2-digit',minute:'2-digit'});
  } catch(e) {
    document.getElementById('tableBody').innerHTML = `<div class="empty"><div class="empty-title">Error de conexión</div>${e.message}</div>`;
    document.getElementById('lastUpdate').textContent = 'Error: ' + e.message;
  }
}

function filterPlatform(p, btn) {
  currentFilter = p;
  document.querySelectorAll('.pf-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}

function getFiltered() {
  if (currentFilter === 'all') return allData;
  return allData.filter(d => d.platform === currentFilter);
}

function renderAll() {
  const d = getFiltered();
  renderSummary(d);
  renderTable(d);
  renderCharts(d);
}

function renderSummary(d) {
  const totalSpend = d.reduce((s,x) => s + (parseFloat(x.spend)||0), 0);
  const totalImpressions = d.reduce((s,x) => s + (parseInt(x.impressions)||0), 0);
  const totalClicks = d.reduce((s,x) => s + (parseInt(x.clicks)||0), 0);
  const avgCTR = totalImpressions > 0 ? (totalClicks / totalImpressions * 100) : 0;
  const avgCPC = totalClicks > 0 ? (totalSpend / totalClicks) : 0;
  document.getElementById('summaryCards').innerHTML = `
    <div class="metric-card accent-card">
      <div class="metric-label">Inversión total</div>
      <div class="metric-value">${fmtARS(totalSpend)}</div>
      <div class="metric-sub">este mes</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Impresiones</div>
      <div class="metric-value">${fmtNum(totalImpressions)}</div>
      <div class="metric-sub">totales</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Clientes activos</div>
      <div class="metric-value">${d.length}</div>
      <div class="metric-sub">con inversión</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">CTR promedio</div>
      <div class="metric-value">${avgCTR.toFixed(2)}%</div>
      <div class="metric-sub">todos los clientes</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">CPC promedio</div>
      <div class="metric-value">${fmtARS(avgCPC)}</div>
      <div class="metric-sub">por click</div>
    </div>
  `;
}

function renderTable(d) {
  document.getElementById('tableCount').textContent = d.length + ' clientes';
  if (!d.length) {
    document.getElementById('tableBody').innerHTML = `<div class="empty"><div class="empty-title">Sin datos</div>Cargá datos desde Windsor.ai</div>`;
    return;
  }
  const maxSpend = Math.max(...d.map(x => parseFloat(x.spend) || 0));
  const rows = d.map(x => `
    <tr>
      <td>
        <div class="client-name">${x.account_name || '—'}</div>
        <div class="perf-bar"><div class="perf-fill" style="width:${Math.round((parseFloat(x.spend)||0)/maxSpend*100)}%"></div></div>
      </td>
      <td><span class="badge ${x.platform === 'facebook' ? 'badge-meta' : 'badge-google'}">${x.platform === 'facebook' ? 'Meta' : 'Google'}</span></td>
      <td class="td-mono">${fmtARS(parseFloat(x.spend))}</td>
      <td class="td-mono">${fmtNum(x.impressions)}</td>
      <td class="td-mono">${fmtNum(x.clicks)}</td>
      <td class="td-mono ${ctrClass(parseFloat(x.ctr))}">${x.ctr ? parseFloat(x.ctr).toFixed(2) + '%' : '—'}</td>
      <td class="td-mono">${fmtARS(parseFloat(x.cpc))}</td>
    </tr>
  `).join('');
  document.getElementById('tableBody').innerHTML = `
    <table>
      <thead><tr>
        <th>Cliente</th><th>Plataforma</th><th>Inversión</th><th>Impresiones</th><th>Clicks</th><th>CTR</th><th>CPC</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function renderCharts(d) {
  const top10 = [...d].sort((a,b) => (parseFloat(b.spend)||0)-(parseFloat(a.spend)||0)).slice(0, 10);
  const labels = top10.map(x => x.account_name ? (x.account_name.length > 16 ? x.account_name.slice(0,16)+'…' : x.account_name) : '—');
  const values = top10.map(x => Math.round(parseFloat(x.spend) || 0));
  const colors = top10.map(x => x.platform === 'facebook' ? 'rgba(108,99,255,0.8)' : 'rgba(251,191,36,0.8)');
  if (barChartInst) barChartInst.destroy();
  barChartInst = new Chart(document.getElementById('barChart'), {
    type: 'bar',
    data: { labels, datasets: [{ data: values, backgroundColor: colors, borderRadius: 4, borderSkipped: false }] },
    options: {
      responsive: true, maintainAspectRatio: false, indexAxis: 'y',
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ' ' + fmtARS(ctx.parsed.x) } } },
      scales: {
        x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#888896', font: { size: 11 }, callback: v => v >= 1000000 ? '$'+(v/1000000).toFixed(1)+'M' : '$'+(v/1000).toFixed(0)+'K' } },
        y: { grid: { display: false }, ticks: { color: '#888896', font: { size: 11 } } }
      }
    }
  });
  const fbSpend = d.filter(x => x.platform === 'facebook').reduce((s,x) => s+(parseFloat(x.spend)||0), 0);
  const gSpend = d.filter(x => x.platform === 'google_ads').reduce((s,x) => s+(parseFloat(x.spend)||0), 0);
  if (donutChartInst) donutChartInst.destroy();
  donutChartInst = new Chart(document.getElementById('donutChart'), {
    type: 'doughnut',
    data: {
      labels: ['Meta Ads', 'Google Ads'],
      datasets: [{ data: [Math.round(fbSpend), Math.round(gSpend)], backgroundColor: ['rgba(108,99,255,0.8)', 'rgba(251,191,36,0.8)'], borderWidth: 0, hoverOffset: 4 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '70%',
      plugins: { legend: { position: 'bottom', labels: { color: '#888896', font: { size: 11 }, padding: 16, boxWidth: 10, boxHeight: 10 } }, tooltip: { callbacks: { label: ctx => ' ' + fmtARS(ctx.parsed) } } }
    }
  });
}

loadData();
setInterval(loadData, REFRESH_INTERVAL);
</script>
</body>
</html>
